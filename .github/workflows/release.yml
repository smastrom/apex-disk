name: Release

on:
   workflow_dispatch:
      inputs:
         prerelease:
            description: 'Mark as pre-release (e.g. semver -beta.1 / -rc.1)'
            type: boolean
            default: false

jobs:
   release:
      runs-on: macos-latest
      permissions:
         contents: write

      steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Validate versions
           run: |
              # Parse latest version from RELEASES.md (first ## v heading = most recent, newest-first)
              TAG=$(grep '^## v' RELEASES.md | head -1 | sed 's/^## //')
              VERSION="${TAG#v}"

              if [ -z "$VERSION" ]; then
                echo "::error::No version heading found in RELEASES.md. Expected format: ## vX.Y.Z"
                exit 1
              fi

              echo "RELEASES.md version: $TAG ($VERSION)"

              # Read versions from source files
              PKG_VERSION=$(node -p "require('./package.json').version")
              TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
              CARGO_VERSION=$(grep -m 1 '^version' src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')

              FAILED=0

              if [ "$PKG_VERSION" != "$VERSION" ]; then
                echo "::error::package.json version ($PKG_VERSION) does not match RELEASES.md ($VERSION)"
                FAILED=1
              fi

              if [ "$TAURI_VERSION" != "$VERSION" ]; then
                echo "::error::tauri.conf.json version ($TAURI_VERSION) does not match RELEASES.md ($VERSION)"
                FAILED=1
              fi

              if [ "$CARGO_VERSION" != "$VERSION" ]; then
                echo "::error::Cargo.toml version ($CARGO_VERSION) does not match RELEASES.md ($VERSION)"
                FAILED=1
              fi

              if [ "$FAILED" -eq 1 ]; then
                exit 1
              fi

              # Check tag doesn't already exist
              if git rev-parse "$TAG" >/dev/null 2>&1; then
                echo "::error::Tag $TAG already exists"
                exit 1
              fi

              echo "All versions match: $VERSION"
              echo "TAG=$TAG" >> "$GITHUB_ENV"

         - name: Setup Node
           uses: actions/setup-node@v6
           with:
              node-version: 22

         - name: Setup pnpm
           uses: pnpm/action-setup@v5

         - name: Install frontend dependencies
           run: pnpm install

         - name: Run unit tests
           run: pnpm test:unit

         - name: Run E2E tests
           run: pnpm test:e2e

         - name: Setup Rust
           uses: dtolnay/rust-toolchain@stable
           with:
              targets: aarch64-apple-darwin,x86_64-apple-darwin

         - name: Rust cache
           uses: swatinem/rust-cache@v2
           with:
              workspaces: src-tauri

         - name: Import Apple Developer Certificate
           env:
              APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
              APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
              KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
           run: |
              echo $APPLE_CERTIFICATE | base64 --decode > certificate.p12
              security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security default-keychain -s build.keychain
              security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security set-keychain-settings -t 3600 -u build.keychain
              security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
              security find-identity -v -p codesigning build.keychain

         - name: Verify Certificate
           run: |
              CERT_INFO=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID")
              CERT_ID=$(echo "$CERT_INFO" | awk -F'"' '{print $2}')
              echo "APPLE_SIGNING_IDENTITY=$CERT_ID" >> $GITHUB_ENV
              echo "Certificate imported: $CERT_ID"

         - name: Build, sign and notarize universal macOS binary
           env:
              APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
              APPLE_ID: ${{ secrets.APPLE_ID }}
              APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
              APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
              TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
              TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
           run: pnpm exec tauri build --target universal-apple-darwin

         - name: Extract release notes
           run: |
              # Extract content between the current version heading and the next version heading (or EOF)
              awk "
                /^## ${TAG}\$/ { found=1; next }
                found && /^## v/ { exit }
                found { print }
              " RELEASES.md > release_notes.md

              if [ ! -s release_notes.md ]; then
                echo "::error::No release notes found for ${TAG}"
                exit 1
              fi

         - name: Generate updater latest.json
           run: |
              VERSION="${TAG#v}"
              BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle/macos"
              TAR_GZ=$(ls "$BUNDLE_DIR"/*.tar.gz | head -1)
              SIG_FILE="${TAR_GZ}.sig"
              TAR_NAME=$(basename "$TAR_GZ")
              SIGNATURE=$(cat "$SIG_FILE")
              PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
              DOWNLOAD_URL="https://github.com/smastrom/apex-disk/releases/download/${TAG}/${TAR_NAME}"

              cat > latest.json <<EOF
              {
                "version": "${VERSION}",
                "pub_date": "${PUB_DATE}",
                "platforms": {
                  "darwin-aarch64": {
                    "url": "${DOWNLOAD_URL}",
                    "signature": "${SIGNATURE}"
                  },
                  "darwin-x86_64": {
                    "url": "${DOWNLOAD_URL}",
                    "signature": "${SIGNATURE}"
                  }
                }
              }
              EOF

         - name: Create tag
           run: |
              git tag "$TAG"
              git push origin "$TAG"

         - name: Create GitHub Release
           uses: softprops/action-gh-release@v2
           with:
              tag_name: ${{ env.TAG }}
              prerelease: ${{ inputs.prerelease }}
              body_path: release_notes.md
              generate_release_notes: false
              files: |
                 src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
                 src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz
                 src-tauri/target/universal-apple-darwin/release/bundle/macos/*.tar.gz.sig
                 latest.json
