name: Tests

on:
   workflow_dispatch:
   # push:
   pull_request:

jobs:
   test:
      strategy:
         fail-fast: false
         matrix:
            # Hosted runners below Ventura have been retired by GitHub.
            # Catalina (10.15 — the minimumSystemVersion) can't be exercised
            # in CI without a self-hosted runner; covered by the static
            # compatibility-check instead.
            os: [macos-13, macos-14, macos-15]
      runs-on: ${{ matrix.os }}

      steps:
         - name: Checkout
           uses: actions/checkout@v6

         - name: Setup Node
           uses: actions/setup-node@v6
           with:
              node-version: 22

         - name: Setup pnpm
           uses: pnpm/action-setup@v5

         - name: Install frontend dependencies
           run: pnpm install

         - name: Setup Rust
           uses: dtolnay/rust-toolchain@stable

         - name: Rust cache
           uses: swatinem/rust-cache@v2
           with:
              workspaces: src-tauri

         - name: Run unit tests
           run: pnpm test:unit

         - name: Run E2E tests
           run: pnpm test:e2e
           env:
              E2E_FDA: 'false'
