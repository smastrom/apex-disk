launchTitle:
   en: Before you begin
   it: Prima di iniziare
   es: Antes de empezar
   fr: Avant de commencer
   pt: Antes de começar
   de: Bevor Sie beginnen
   ru: Перед началом
   zh: 开始之前
   ja: 開始する前に
   ar: قبل البدء

launchBodyLine1:
   en: >-
      To ensure maximum accuracy, closing other apps during the scan is
      recommended. On large disks, the operation may take over a minute.
   it: >-
      Per garantire la massima precisione dei risultati, è consigliato chiudere
      le altre app durante la scansione. Su dischi di grandi dimensioni,
      l'operazione può richiedere più di un minuto.
   es: >-
      Para garantizar la máxima precisión de los resultados, se recomienda cerrar
      otras aplicaciones durante el análisis. En discos grandes, la operación
      puede tardar más de un minuto.
   fr: >-
      Pour garantir une précision maximale des résultats, il est recommandé
      de fermer les autres applications pendant l'analyse. Sur les disques
      volumineux, l'opération peut prendre plus d'une minute.
   pt: >-
      Para garantir a máxima precisão dos resultados, é recomendado fechar outras
      aplicações durante a análise. Em discos grandes, a operação pode demorar
      mais de um minuto.
   de: >-
      Um maximale Genauigkeit der Ergebnisse zu gewährleisten, wird empfohlen,
      andere Apps während des Scans zu schließen. Bei großen Festplatten kann
      der Vorgang über eine Minute dauern.
   ru: >-
      Для обеспечения максимальной точности результатов рекомендуется закрыть
      другие приложения во время сканирования. На больших дисках это может
      занять более минуты.
   zh: 为确保结果的最高准确性，建议在扫描期间关闭其他应用程序。在大容量磁盘上，此操作可能需要超过一分钟。
   ja: 正確な結果を得るために、スキャン中は他のアプリを閉じることが推奨されます。大容量ディスクでは、操作に1分以上かかる場合があります。
   ar: >-
      لضمان أقصى قدر من الدقة في النتائج، يُنصح بإغلاق التطبيقات الأخرى
      أثناء المسح. قد تستغرق العملية أكثر من دقيقة على الأقراص الكبيرة.

launchBodyLine2:
   en: >-
      For your safety, files are moved to the Trash. Please review your selection
      and... happy cleaning!
   it: >-
      Per la tua sicurezza, i file verranno spostati nel Cestino. Revisiona
      attentamente la tua selezione e... buona pulizia!
   es: >-
      Por su seguridad, los archivos se moverán a la Papelera. Por favor, revise
      su selección y... ¡feliz limpieza!
   fr: >-
      Par sécurité, les fichiers sont déplacés vers la Corbeille. Veuillez
      réviser votre sélection et... bon nettoyage !
   pt: >-
      Para sua segurança, os ficheiros serão movidos para o Lixo. Por favor,
      reveja a sua seleção e... boa limpeza!
   de: >-
      Zur Sicherheit werden Dateien in den Papierkorb verschoben. Bitte
      überprüfen Sie Ihre Auswahl und... viel Erfolg beim Aufräumen!
   ru: >-
      Для вашей безопасности файлы перемещаются в Корзину. Пожалуйста, проверьте
      свой выбор и... удачной очистки!
   zh: 为确保安全，文件将被移至废纸篓。请检查并确认您的选择……祝您清理愉快！
   ja: 安全のため、ファイルはゴミ箱に移動されます。選択内容を再度確認して... クリーニングをお楽しみください！
   ar: >-
      لسلامتك، سيتم نقل الملفات إلى سلة المهملات. يرجى مراجعة اختيارك...
      وتنظيفاً موفقاً!

