edition = "2021"

# Line width and indentation
max_width = 100
newline_style = "Unix"
hard_tabs = false
tab_spaces = 4

# Pack short structs / match arms / call args onto one line where they fit
use_small_heuristics = "Max"

# Trailing comma in match arms for cleaner diffs
match_block_trailing_comma = true

# Nightly-only options below. `cargo fmt` on stable warns and skips them;
# the lint-staged hook and `pnpm rust:fmt` invoke nightly directly.
unstable_features = true

# Group imports into std / external / crate-internal blocks, like our JS setup
group_imports = "StdExternalCrate"

# Collapse adjacent `use` lines from the same crate into a single nested form
imports_granularity = "Crate"

# Wrap long line comments at max_width
wrap_comments = true
comment_width = 100

# Format Rust code inside `///` doc examples
format_code_in_doc_comments = true

# Wrap long string literals
format_strings = true

# Normalize `/*` block comments to `//` line comments where possible
normalize_comments = true
